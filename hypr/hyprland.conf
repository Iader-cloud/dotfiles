# =========================================================
# HYPRLAND CONFIG
# =========================================================


# =========================================================
# VARIABLES
# =========================================================

$mainMod = SUPER

$terminal = kitty
$fileManager = kitty ranger
$menu = rofi -show drun -theme ~/.config/rofi/theme.rasi


# =========================================================
# MONITORS
# =========================================================

monitor = , preferred, auto, 1


# =========================================================
# AUTOSTART
# =========================================================

exec-once = waybar
exec-once = awww-daemon
exec-once = sh -c 'sleep 1 && awww img ~/Downloads/1.jpg'

# Notifications
# exec-once = dunst

# Network applet
# exec-once = nm-applet


# =========================================================
# ENVIRONMENT VARIABLES
# =========================================================

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Classic


# =========================================================
# INPUT
# =========================================================

input {
    kb_layout = us
    kb_variant = altgr-intl

    follow_mouse = 1

    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}


# =========================================================
# GENERAL
# =========================================================

general {
    gaps_in = 6
    gaps_out = 14

    border_size = 2

    col.active_border = rgba(cfcfcfee)
    col.inactive_border = rgba(444444aa)

    resize_on_border = true

    allow_tearing = false

    layout = dwindle
}


# =========================================================
# DECORATION
# =========================================================

decoration {
    rounding = 12

    active_opacity = 0.96
    inactive_opacity = 0.88

    shadow {
        enabled = true
        range = 8
        render_power = 3
        color = rgba(00000055)
    }

    blur {
        enabled = true
        size = 10
        passes = 2
	ignore_opacity = true
        vibrancy = 0.25
    }
}


# =========================================================
# ANIMATIONS
# =========================================================

animations {
    bezier = overshot,0.05,0.9,0.1,1.05

    animation = windows,1,4,overshot,popin 87%
    animation = border,1,5,default
    animation = fade,1,3,default
    animation = workspaces,1,3,default
}


# =========================================================
# LAYOUTS
# =========================================================

dwindle {
    preserve_split = true
}

master {
    # CORREGIDO: Sintaxis correcta para la gestión de ventanas nuevas en master layout
    new_on_active = before 
}


# =========================================================
# MISC
# =========================================================

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = true
}


# =========================================================
# APPLICATION BINDS
# =========================================================

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu


# =========================================================
# WINDOW MANAGEMENT
# =========================================================

bind = $mainMod, C, killactive
bind = $mainMod, V, togglefloating
bind = $mainMod, P, pseudo
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod SHIFT, M, exit


# =========================================================
# WINDOW FOCUS
# =========================================================

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d


# =========================================================
# WORKSPACES
# =========================================================

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10


# =========================================================
# MOVE WINDOWS TO WORKSPACES
# =========================================================

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10


# =========================================================
# SPECIAL WORKSPACE
# =========================================================

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic


# =========================================================
# MOUSE CONTROLS
# =========================================================

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


# =========================================================
# SCREENSHOTS
# =========================================================

bind = SHIFT, F1, exec, sh -c 'f=~/Imágenes/screenshot_$(date +%Y%m%d_%H%M%S).png; grim "$f" && wl-copy < "$f"'
bind = SHIFT, F2, exec, sh -c 'f=~/Imágenes/screenshot_$(date +%Y%m%d_%H%M%S).png; grim -g "$(slurp)" "$f" && wl-copy < "$f"'


# =========================================================
# AUDIO / BRIGHTNESS KEYS
# =========================================================

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-


# =========================================================
# MEDIA CONTROLS
# =========================================================

bindel = ,XF86AudioNext, exec, playerctl next
bindel = ,XF86AudioPause, exec, playerctl play-pause
bindel = ,XF86AudioPlay, exec, playerctl play-pause
bindel = ,XF86AudioPrev, exec, playerctl previous

# =========================================================
# WINDOW RULE
# =========================================================
windowrulev2 = float, class:kitty
windowrulev2 = center, class:kitty
